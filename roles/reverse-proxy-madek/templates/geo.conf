# Managed with ansible
#
# Geo lookup + optional country whitelisting via mod_maxminddb against the
# DB-IP Lite Country database (CC BY 4.0, refreshed monthly).
#
# Caveats:
#   - Country mapping is ~99% accurate but NOT reliable for VPN, Tor, cloud
#     egress, mobile-CGNAT or new/unrouted allocations.
#   - This feature exists to allow degraded-but-available operation during
#     abusive traffic spikes that have repeatedly approached DDoS levels.
#     It is NOT a security boundary.
#   - Loopback / RFC1918 / IPv6 link-local & ULA are always allowed so local
#     probes and internal monitoring keep working.

MaxMindDBEnable On
MaxMindDBFile DB_IP_COUNTRY {{ geo_whitelist_db_path }}
MaxMindDBEnv MM_COUNTRY_CODE    DB_IP_COUNTRY/country/iso_code
MaxMindDBEnv MM_CONTINENT_CODE  DB_IP_COUNTRY/continent/code
MaxMindDBEnv MM_IS_IN_EU        DB_IP_COUNTRY/country/is_in_european_union

{% if geo_whitelist_enabled %}

RewriteEngine On

# Deny the request (HTTP 403) iff:
#   1. the client is NOT in a private / loopback range, AND
#   2. the resolved country is not on the whitelist (which also denies
#      unknown / unmapped IPs, where MM_COUNTRY_CODE is empty).
RewriteCond %{REMOTE_ADDR} !^(127\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|::1$|fe80:|fc|fd)
RewriteCond %{ENV:MM_COUNTRY_CODE} !^({{ geo_whitelist_countries | join('|') }})$
RewriteRule ^ - [F,L]

{% endif %}

# vim: syntax=apache
